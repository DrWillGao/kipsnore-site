<svg viewBox="0 0 600 168" role="img" aria-label="Approximate snoring loudness in decibels: mild snoring is 40 to 50 dB like a quiet office, moderate is 50 to 60 dB like normal conversation, loud is 60 to 80 dB, and heavy snoring is above 80 dB, rising to a record 93 dB." xmlns="http://www.w3.org/2000/svg"><title>How loud is snoring, by decibels</title><text x="40" y="26" font-family="Fraunces, Georgia, serif" font-size="17" font-weight="600" fill="#1a1814">How loud is snoring?</text><defs><clipPath id="decibelsClip"><rect x="40" y="46" width="520" height="48" rx="8"/></clipPath></defs><g clip-path="url(#decibelsClip)"><rect x="40" y="46" width="173" height="48" fill="#3f7a5e"/><rect x="213" y="46" width="87" height="48" fill="#c9a23a"/><rect x="300" y="46" width="173" height="48" fill="#c97a3a"/><rect x="473" y="46" width="87" height="48" fill="#b4452f"/></g><g font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" fill="#ffffff" font-weight="600" text-anchor="middle"><text x="126" y="75" font-size="14">Mild</text><text x="256" y="75" font-size="12">Moderate</text><text x="386" y="75" font-size="14">Loud</text><text x="516" y="75" font-size="12">Heavy</text></g><g font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" fill="#756e63" font-size="12"><text x="40" y="114" text-anchor="middle">30</text><text x="213" y="114" text-anchor="middle">50</text><text x="300" y="114" text-anchor="middle">60</text><text x="473" y="114" text-anchor="middle">80</text><text x="560" y="114" text-anchor="end">93+</text><text x="126" y="132" text-anchor="middle">Quiet office</text><text x="256" y="132" text-anchor="middle">Conversation</text><text x="473" y="132" text-anchor="middle">Busy road</text><text x="300" y="156" text-anchor="middle">Loudness in decibels (dB)</text></g></svg>