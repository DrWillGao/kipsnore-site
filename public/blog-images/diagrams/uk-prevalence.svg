<svg viewBox="0 0 600 170" role="img" aria-label="Snoring and sleep apnoea in the UK: around 36 percent of UK adults snore habitually, an estimated 1.5 million UK adults have sleep apnoea, and up to roughly 85 percent of those cases are thought to be undiagnosed." xmlns="http://www.w3.org/2000/svg"><title>Snoring and sleep apnoea in the UK</title><text x="40" y="26" font-family="Fraunces, Georgia, serif" font-size="17" font-weight="600" fill="#1a1814">Snoring and sleep apnoea in the UK</text><g stroke="#d9d2c2" stroke-width="1"><line x1="220" y1="50" x2="220" y2="142"/><line x1="380" y1="50" x2="380" y2="142"/></g><g font-family="Fraunces, Georgia, serif" font-size="40" font-weight="600" fill="#1e3a5f" text-anchor="middle"><text x="140" y="86">~36%</text><text x="300" y="86">1.5m</text><text x="460" y="86">~85%</text></g><g font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="12.5" fill="#756e63" text-anchor="middle"><text x="140" y="116">UK adults snore</text><text x="140" y="132">habitually</text><text x="300" y="116">UK adults estimated to</text><text x="300" y="132">have sleep apnoea</text><text x="460" y="116">of apnoea cases thought</text><text x="460" y="132">to be undiagnosed</text></g></svg>