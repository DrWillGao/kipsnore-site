<svg viewBox="0 0 600 176" role="img" aria-label="STOP-BANG score and OSA risk: a score of 0 to 2 is lower risk, 3 to 4 is intermediate risk, and 5 to 8 is higher risk. A score of 3 or more is a reason to see your GP." xmlns="http://www.w3.org/2000/svg"><title>STOP-BANG score and OSA risk</title><text x="40" y="26" font-family="Fraunces, Georgia, serif" font-size="17" font-weight="600" fill="#1a1814">STOP-BANG score and OSA risk</text><defs><clipPath id="stopbangClip"><rect x="40" y="46" width="520" height="48" rx="8"/></clipPath></defs><g clip-path="url(#stopbangClip)"><rect x="40" y="46" width="130" height="48" fill="#3f7a5e"/><rect x="170" y="46" width="130" height="48" fill="#c9a23a"/><rect x="300" y="46" width="260" height="48" fill="#b4452f"/></g><g font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" fill="#ffffff" font-weight="600" text-anchor="middle"><text x="105" y="75" font-size="14">Lower risk</text><text x="235" y="75" font-size="13">Intermediate</text><text x="430" y="75" font-size="14">Higher risk</text></g><g font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" fill="#756e63" font-size="12"><text x="40" y="114" text-anchor="middle">0</text><text x="170" y="114" text-anchor="middle">2</text><text x="235" y="114" text-anchor="middle">3</text><text x="300" y="114" text-anchor="middle">5</text><text x="560" y="114" text-anchor="end">8</text></g><g font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif"><line x1="235" y1="42" x2="235" y2="98" stroke="#1a1814" stroke-width="2"/><circle cx="235" cy="42" r="3.5" fill="#1a1814"/><text x="235" y="138" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1814">3 or more: a reason to see your GP</text></g><text x="300" y="162" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" fill="#756e63" font-size="12">STOP-BANG score (0 to 8)</text></svg>