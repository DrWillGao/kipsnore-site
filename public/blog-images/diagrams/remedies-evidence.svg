<svg viewBox="0 0 600 318" role="img" aria-label="How well eight snoring remedies are backed by evidence: losing excess weight and a mandibular advancement mouthpiece have strong evidence; sleeping on your side, cutting evening alcohol, throat exercises and treating a blocked nose have moderate evidence; nasal strips and anti-snore pillows have limited evidence." xmlns="http://www.w3.org/2000/svg"><title>How well snoring remedies are backed by evidence</title><text x="40" y="26" font-family="Fraunces, Georgia, serif" font-size="17" font-weight="600" fill="#1a1814">How well snoring remedies are backed by evidence</text><g font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif"><g fill="#d9d2c2"><rect x="210" y="46" width="350" height="20" rx="5"/><rect x="210" y="78" width="350" height="20" rx="5"/><rect x="210" y="110" width="350" height="20" rx="5"/><rect x="210" y="142" width="350" height="20" rx="5"/><rect x="210" y="174" width="350" height="20" rx="5"/><rect x="210" y="206" width="350" height="20" rx="5"/><rect x="210" y="238" width="350" height="20" rx="5"/><rect x="210" y="270" width="350" height="20" rx="5"/></g><rect x="210" y="46" width="350" height="20" rx="5" fill="#3f7a5e"/><rect x="210" y="78" width="233" height="20" rx="5" fill="#c9a23a"/><rect x="210" y="110" width="233" height="20" rx="5" fill="#c9a23a"/><rect x="210" y="142" width="350" height="20" rx="5" fill="#3f7a5e"/><rect x="210" y="174" width="233" height="20" rx="5" fill="#c9a23a"/><rect x="210" y="206" width="233" height="20" rx="5" fill="#c9a23a"/><rect x="210" y="238" width="117" height="20" rx="5" fill="#9c9384"/><rect x="210" y="270" width="117" height="20" rx="5" fill="#9c9384"/><g fill="#1a1814" font-size="13"><text x="40" y="60">Lose excess weight</text><text x="40" y="92">Sleep on your side</text><text x="40" y="124">Cut evening alcohol</text><text x="40" y="156">Mouthpiece (MAD)</text><text x="40" y="188">Throat exercises</text><text x="40" y="220">Treat a blocked nose</text><text x="40" y="252">Nasal strips</text><text x="40" y="284">Anti-snore pillow</text></g><g fill="#ffffff" font-size="11" font-weight="600" text-anchor="end"><text x="550" y="60">Strong</text><text x="433" y="92">Moderate</text><text x="433" y="124">Moderate</text><text x="550" y="156">Strong</text><text x="433" y="188">Moderate</text><text x="433" y="220">Moderate</text></g><g fill="#1a1814" font-size="11" font-weight="600"><text x="335" y="252">Limited</text><text x="335" y="284">Limited</text></g></g></svg>