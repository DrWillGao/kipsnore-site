<svg viewBox="0 0 600 158" role="img" aria-label="How snoring happens in three steps: air flows in as you breathe, the throat muscles relax so the airway narrows, then soft tissue vibrates to make the snoring sound." xmlns="http://www.w3.org/2000/svg"><title>How snoring happens, in three steps</title><text x="40" y="26" font-family="Fraunces, Georgia, serif" font-size="17" font-weight="600" fill="#1a1814">How snoring happens</text><g font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif"><rect x="40" y="54" width="150" height="74" rx="14" fill="#ffffff" stroke="rgba(26,24,20,0.12)"/><rect x="225" y="54" width="150" height="74" rx="14" fill="#ffffff" stroke="rgba(26,24,20,0.12)"/><rect x="410" y="54" width="150" height="74" rx="14" fill="#1e3a5f"/><g fill="#1a1814" font-size="13" text-anchor="middle"><text x="115" y="88">Air flows in</text><text x="115" y="106">as you breathe</text><text x="300" y="88">Muscles relax,</text><text x="300" y="106">the airway narrows</text></g><g fill="#ffffff" font-size="13" text-anchor="middle"><text x="485" y="88">Soft tissue</text><text x="485" y="106">vibrates: a snore</text></g><g stroke="#1e3a5f" stroke-width="2" fill="none"><path d="M196 91 L219 91"/><path d="M212 86 L220 91 L212 96"/><path d="M381 91 L404 91"/><path d="M397 86 L405 91 L397 96"/></g></g></svg>