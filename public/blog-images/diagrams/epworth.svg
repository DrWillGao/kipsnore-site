<svg viewBox="0 0 600 150" role="img" aria-label="Epworth Sleepiness Scale bands from 0 to 24: normal 0 to 7, mild 8 to 9, moderate 10 to 15, and high 16 to 24, with a score above 10 suggesting excessive daytime sleepiness." xmlns="http://www.w3.org/2000/svg"><title>Epworth Sleepiness Scale interpretation bands</title><text x="40" y="26" font-family="Fraunces, Georgia, serif" font-size="17" font-weight="600" fill="#1a1814">Epworth Sleepiness Scale</text><defs><clipPath id="epworthClip"><rect x="40" y="46" width="520" height="48" rx="8"/></clipPath></defs><g clip-path="url(#epworthClip)"><rect x="40" y="46" width="173.33" height="48" fill="#3f7a5e"/><rect x="213.33" y="46" width="43.34" height="48" fill="#c9a23a"/><rect x="256.67" y="46" width="130" height="48" fill="#c97a3a"/><rect x="386.67" y="46" width="173.33" height="48" fill="#b4452f"/></g><g font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" fill="#ffffff" font-weight="600" text-anchor="middle"><text x="126.67" y="75" font-size="14">Normal</text><text x="235" y="75" font-size="10">Mild</text><text x="321.67" y="75" font-size="13">Moderate</text><text x="473.33" y="75" font-size="14">High</text></g><g font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif" fill="#756e63" font-size="12"><text x="40" y="114" text-anchor="middle">0</text><text x="213.33" y="114" text-anchor="middle">8</text><text x="256.67" y="114" text-anchor="middle">10</text><text x="386.67" y="114" text-anchor="middle">16</text><text x="560" y="114" text-anchor="end">24</text><text x="300" y="138" text-anchor="middle">Epworth score (0 to 24)</text></g></svg>